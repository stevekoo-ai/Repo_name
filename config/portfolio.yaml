# PEOS portfolio holdings (Master Instruction 14.2, 13.4-13.9).
# Structure and field names must stay stable since engine/personal reads
# these keys directly.
#
# stocks/etf are REAL holdings as of 2026-07-14, provided directly by the
# user across two brokers:
#   - 한국투자증권: 일반 주식 계좌 + ISP 계좌 (+ IRP/DC 퇴직연금, see below)
#   - 하나증권: 하나증권 계좌 (SK하이닉스 110주)
# Tickers held in multiple accounts (SK하이닉스: 한국투자증권 일반+ISP +
# 하나증권; 삼성전자: 한국투자증권 ISP) are merged into one position here
# (quantity summed, avg_price recomputed from combined purchase amount) —
# PEOS scores total exposure per ticker, not per-account/per-broker lots.
# retirement_accounts (IRP/DC, 한국투자증권) are also REAL, kept in their
# own section since they're locked until retirement (see that section's
# own note).
# cash/bonds/subscription_savings below are still EXAMPLE placeholders —
# not part of what was provided.

