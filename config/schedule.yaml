# PEOS automation schedule (Master Instruction 18.3, 18.4).
# Describes intended cadence; wiring this to an actual scheduler
# (GitHub Actions cron, APScheduler) is a Phase-8+ deployment step.

jobs:
  daily_peos_update:
    description: "일일 PEOS 리포트 — 06:00 시작, 08:00 완료 및 이메일 발송"
    cron: "0 23 * * *"   # 매일 23:00 UTC = 08:00 KST (실제 완료), 06:00부터 수집 개시
    scope: [daily_market, daily_investment, daily_semiconductor]
    output: report/daily.html, report/<YYYY-MM-DD>.json
    notify: email (SMTP_HOST/SMTP_USER/SMTP_PASSWORD/NOTIFY_EMAIL_TO)

  monthly_kr_exports:
    description: "한국 수출/반도체 수출 업데이트"
    cron: "0 23 1 * *"   # 매월 1일 08:00 KST 근처(발표 즉시 수동 트리거 권장)
    scope: [exports, semiconductor_exports]

  us_employment_trigger:
    description: "미국 고용지표(NFP) 발표 시 실행 (매월 첫째 금요일 밤 실행 권장)"
    cron: null
    trigger: on_release
    scope: [us_employment]

  us_cpi_trigger:
    description: "미국 CPI 발표 시 실행"
    cron: null
    trigger: on_release
    scope: [us_cpi]

  kr_cpi_ppi_trigger:
    description: "한국 CPI/PPI 발표 시 실행"
    cron: null
    trigger: on_release
    scope: [kr_cpi, kr_ppi]

  monthly_macro_deepdive:
    description: "월간 거시경제 심층 분석 — 핵심 지표 발표 이후 전략 재점검"
    cron: "0 23 5 * *"   # 매월 5일 08:00 KST 근처 (핵심지표 발표 이후)
    scope: [full_macro_pipeline, scenario_analysis]
    output: report/<YYYY-MM>.html, report/<YYYY-MM>.md, report/<YYYY-MM>.json

report_generation_triggers:
  - monthly_key_indicators_complete
  - gdp_release
  - imf_outlook_release
  - bok_outlook_revision
  - fomc_key_variable_change
  - user_manual_request
