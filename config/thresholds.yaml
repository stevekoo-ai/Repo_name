# PEOS numeric thresholds (Master Instruction 7, 11.6, 11.12, 18.5).
# Every "magic number" referenced by engine code should be calibrated here.

# 7.2 데이터 신뢰도 등급 — 판단에는 기본적으로 ★★★★ 이상만 사용.
data_governance:
  minimum_reliability_grade_for_judgment: 4
  semiconductor_exception_minimum_grade: 3   # 7.3 반도체 특화 데이터 예외
  cross_validation_min_sources: 2
  single_official_source_allowed: true

# 7.8 이상치 탐지: 전월 대비 변화가 이 배수를 넘으면 Warning + 기저효과 확인 필요
outlier_detection:
  yoy_change_warning_multiplier: 5.0   # e.g. |current - previous| > 5x previous(abs) 이상이면 경고
  min_abs_previous_for_multiplier_check: 1.0

# 7.11 / 18.2 staleness (일 단위) — 이 기간이 지나면 데이터가 'stale'로 표시됨
staleness_days:
  realtime_fx: 1
  bond_yield: 1
  market_index: 2
  monthly_macro: 45
  quarterly_macro: 100
  annual_macro: 400

# 18.5 필수 지표 충족률
report_readiness:
  draft_report_min_coverage_pct: 80
  final_report_requires_core10_complete: true

# 11.6 총점 기반 1차 판정 구간 (가중치 미적용 원 점수 기준, -10~+10)
score_bands:
  strong_expansion: { min: 7, max: 10, label_kr: "강한 확장" }
  expansion: { min: 4, max: 6, label_kr: "확장" }
  unbalanced_expansion: { min: 1, max: 3, label_kr: "불균형 확장" }
  early_slowdown: { min: 0, max: 0, label_kr: "초기 둔화" }
  slowdown: { min: -4, max: -1, label_kr: "둔화" }
  recession_warning: { min: -999, max: -5, label_kr: "침체 경고" }

# 11.7~11.10 Regime 전이 시그널 판정에 쓰이는 매그니튜드 임계값
regime_signals:
  export_slump_yoy_drop_pp: 10.0        # 전월 대비 10%p 이상 급락 시 export_slump
  semiconductor_export_slump_yoy_drop_pp: 15.0
  ip_consecutive_decline_months: 2
  cpi_reaccelerating_pp: 0.2            # 2개월 연속 상승 + 누적 0.2%p 이상
  ppi_sustained_high_threshold: 6.0
  ppi_sustained_months: 2
  fx_surge_mom_pct: 3.0
  rates_rising_bp_3m: 25
  unemployment_surge_pp: 0.2
  us_employment_cooling_composite: -0.5
  yield_curve_inversion_deepening_bp: -10
  gdp_strong_qoq: 0.8
  exports_strong_yoy: 10.0
  semiconductor_strong_yoy: 20.0
  cpi_stable_range: [1.5, 2.5]
  ppi_easing_drop_pp: 0.3
  rates_easing_bp_3m: -25
  us_employment_improving_composite: 0.5

# 11.12 Change Detection (지난달 대비, thresholds externalized)
change_detection:
  exports_improve_pp: 5.0
  cpi_improve_pp: -0.2      # 0.2%p 이상 하락 -> 개선
  unemployment_caution_pp: 0.2
  ppi_ease_pp: -0.3

# 12.5 Semiconductor 상태 구간 (0-100)
semiconductor_bands:
  strong_positive: { min: 80, max: 100 }
  positive: { min: 65, max: 79 }
  neutral_plus: { min: 50, max: 64 }
  cautious: { min: 35, max: 49 }
  weak_risk: { min: 0, max: 34 }

# 14.3 자산 영향도 별점 구간는 core/models.score_to_stars (85/70/55/40) 공통 사용.

# 15.4 Action 등급도 동일한 85/70/55/40 구간 (core/models.action_priority_stars) 사용.

# 16.9 시나리오 확률 산정 시 신호 카운트 → 확률 가중치로 변환하는 스케일
scenario_probability:
  base_default: 60
  signal_shift_per_count: 5   # bull/bear 신호 1개당 ±5%p, base에서 이동
  min_probability: 10
  max_probability: 70
