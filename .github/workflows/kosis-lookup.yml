name: KOSIS Table Lookup

on:
  workflow_dispatch:
    inputs:
      series:
        description: "확인할 지표 key (비워두면 4개 전부): cpi_index / industrial_production_index / retail_sales_index / unemployment_rate"
        required: false
        default: ""

jobs:
  lookup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Look up KOSIS candidate tables
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python -m scripts.kosis_lookup ${{ github.event.inputs.series }}
