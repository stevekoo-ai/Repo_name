name: Monthly PEOS Report (Macro Deep Dive)

on:
  schedule:
    # 매월 5일 08:00 KST — 핵심 거시 지표 발표 이후 심층 분석 리포트
    - cron: "0 23 5 * *"
  workflow_dispatch:
    inputs:
      month:
        description: "리포트 대상 월 (YYYY-MM). 비워두면 실행 시점의 이번 달."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: monthly-peos-report
  cancel-in-progress: false

jobs:
  run-monthly-peos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PEOS monthly macro deep-dive (거시경제 심층 분석)
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python -m engine.report.run --month "${{ github.event.inputs.month }}" --monthly
          else
            python -m engine.report.run --monthly
          fi

      - name: Commit updated monthly report and snapshot
        run: |
          git config user.name "peos-monthly-bot"
          git config user.email "actions@users.noreply.github.com"
          git add report/ data/snapshots/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: monthly PEOS macro report $(date -u +%Y-%m)"
            git push
          fi
