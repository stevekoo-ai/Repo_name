# 📚 Lesson Learned Reference: docs/LESSON_LEARNED_API_DEBUGGING.md
# Ad-hoc lookup tool for one-off questions about a specific 청약Home listing
# (e.g. "광교 A17 공공분양 여부/평형/접수마감 확인"). Uses the same
# Infuser auth + --data-urlencode pattern documented in the lesson-learned doc.

name: Ad-hoc subscription query

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: 'HOUSE_NM::LIKE search keyword'
        required: true
        default: '광교'
  push:
    branches:
      - claude/yongin-platform-city-subscription-18s8wt
    paths:
      - .github/workflows/adhoc-subscription-query.yml

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - name: Query 청약Home by HOUSE_NM keyword
        env:
          SERVICE_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          KEYWORD: ${{ github.event.inputs.keyword || '원천동' }}
        run: |
          code=$(curl -sS -G "https://api.odcloud.kr/api/ApplyhomeInfoDetailSvc/v1/getAPTLttotPblancDetail" \
            -H "Authorization: Infuser ${SERVICE_KEY}" \
            --data-urlencode "page=1" \
            --data-urlencode "perPage=50" \
            --data-urlencode "cond[HOUSE_NM::LIKE]=${KEYWORD}" \
            -o resp.json -w "%{http_code}")
          echo "HTTP status: $code"
          python3 -c "import json; d=json.load(open('resp.json')); print(json.dumps(d, ensure_ascii=False, indent=2))"

      - name: Query 청약Home by HSSPLY_ADRES keyword (block code often only in address)
        env:
          SERVICE_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          KEYWORD: ${{ github.event.inputs.keyword || '원천동' }}
        run: |
          code=$(curl -sS -G "https://api.odcloud.kr/api/ApplyhomeInfoDetailSvc/v1/getAPTLttotPblancDetail" \
            -H "Authorization: Infuser ${SERVICE_KEY}" \
            --data-urlencode "page=1" \
            --data-urlencode "perPage=50" \
            --data-urlencode "cond[HSSPLY_ADRES::LIKE]=${KEYWORD}" \
            -o resp_addr.json -w "%{http_code}")
          echo "HTTP status: $code"
          python3 -c "import json; d=json.load(open('resp_addr.json')); print(json.dumps(d, ensure_ascii=False, indent=2))"

      - name: Query 청약Home by HSSPLY_ADRES for 영통구 (원천동's district, catch nearby listings)
        env:
          SERVICE_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: |
          code=$(curl -sS -G "https://api.odcloud.kr/api/ApplyhomeInfoDetailSvc/v1/getAPTLttotPblancDetail" \
            -H "Authorization: Infuser ${SERVICE_KEY}" \
            --data-urlencode "page=1" \
            --data-urlencode "perPage=50" \
            --data-urlencode "cond[HSSPLY_ADRES::LIKE]=영통구" \
            -o resp_yeongtong.json -w "%{http_code}")
          echo "HTTP status: $code"
          python3 -c "import json; d=json.load(open('resp_yeongtong.json')); print('matchCount', d.get('matchCount')); [print(x.get('HOUSE_NM'), '|', x.get('HOUSE_DTL_SECD_NM'), '|', x.get('HSSPLY_ADRES'), '|', x.get('RCRIT_PBLANC_DE'), '|', x.get('TOT_SUPLY_HSHLDCO')) for x in d.get('data', [])]"
