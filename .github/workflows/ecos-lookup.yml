name: ECOS Table Lookup

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "ECOS 통계표명에서 검색할 키워드 (예: 경제성장률)"
        required: true
        default: "경제성장률"

jobs:
  lookup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Look up ECOS statistic tables
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python -m scripts.ecos_lookup "${{ github.event.inputs.keyword }}"
