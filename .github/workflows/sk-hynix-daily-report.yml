name: SK하이닉스 자동 1차 리포트

on:
  schedule:
    # cron은 UTC 기준. KST(UTC+9) 07:00/10:00/19:00에 맞춘 것.
    - cron: "0 22 * * *"  # 07:00 KST
    - cron: "0 1 * * *"   # 10:00 KST
    - cron: "0 10 * * *"  # 19:00 KST
  workflow_dispatch: {}   # 수동 실행(테스트용)

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 종목별 투자자매매동향 fetch
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python3 scripts/investor_flow.py fetch --ticker 000660 --days 30

      - name: 1차 리포트 생성
        id: report
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: |
          cd scripts
          python3 daily_report.py --ticker 000660 | tee /tmp/report.md
          echo "report_path=$(ls -t ../sources/sk-hynix-auto-report-*.md | head -1)" >> "$GITHUB_OUTPUT"

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "sk-hynix-auto-report-bot"
          git config user.email "actions@users.noreply.github.com"
          git add sources/sk-hynix-investor-flow.csv sources/sk-hynix-auto-report-*.md
          git diff --cached --quiet || git commit -m "자동 리포트: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: 이메일 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[SK하이닉스 자동 리포트] ${{ github.event.repository.name }}"
          to: ${{ secrets.MAIL_TO }}
          from: SK하이닉스 자동 리포트 봇
          body: file:///tmp/report.md
