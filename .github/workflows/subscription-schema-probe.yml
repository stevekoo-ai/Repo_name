name: Subscription API schema probe

on:
  push:
    branches:
      - claude/yongin-platform-city-subscription-18s8wt
    paths:
      - .github/workflows/subscription-schema-probe.yml
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Smart check - historical 플랫폼시티 naming in HOUSE_NM (all-time, no date filter)
        env:
          SERVICE_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: |
          echo "=== cond[HOUSE_NM::LIKE]=플랫폼시티, no date restriction ==="
          code=$(curl -sS -G "https://api.odcloud.kr/api/ApplyhomeInfoDetailSvc/v1/getAPTLttotPblancDetail" \
            -H "Authorization: Infuser ${SERVICE_KEY}" \
            --data-urlencode "page=1" \
            --data-urlencode "perPage=50" \
            --data-urlencode "cond[HOUSE_NM::LIKE]=플랫폼시티" \
            -o resp_platformcity.json -w "%{http_code}")
          echo "HTTP status: $code"
          python3 -c "import json; d=json.load(open('resp_platformcity.json')); print('matchCount', d.get('matchCount'), 'totalCount', d.get('totalCount')); [print(x.get('HOUSE_NM'), '|', x.get('HOUSE_DTL_SECD_NM'), '|', x.get('SUBSCRPT_AREA_CODE_NM'), '|', x.get('HSSPLY_ADRES'), '|', x.get('RCRIT_PBLANC_DE')) for x in d.get('data', [])]"

      - name: Smart check - 용인시 listings, any type, all-time (address naming patterns)
        env:
          SERVICE_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: |
          echo "=== cond[HSSPLY_ADRES::LIKE]=용인, no date restriction ==="
          code=$(curl -sS -G "https://api.odcloud.kr/api/ApplyhomeInfoDetailSvc/v1/getAPTLttotPblancDetail" \
            -H "Authorization: Infuser ${SERVICE_KEY}" \
            --data-urlencode "page=1" \
            --data-urlencode "perPage=50" \
            --data-urlencode "cond[HSSPLY_ADRES::LIKE]=용인" \
            -o resp_yongin.json -w "%{http_code}")
          echo "HTTP status: $code"
          python3 -c "import json; d=json.load(open('resp_yongin.json')); print('matchCount', d.get('matchCount'), 'totalCount', d.get('totalCount')); [print(x.get('HOUSE_NM'), '|', x.get('HOUSE_DTL_SECD_NM'), '|', x.get('HSSPLY_ADRES'), '|', x.get('RCRIT_PBLANC_DE')) for x in d.get('data', [])]"

      - name: Smart check - 기흥구 specifically (플랫폼시티 실제 위치 구)
        env:
          SERVICE_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: |
          echo "=== cond[HSSPLY_ADRES::LIKE]=기흥구, no date restriction ==="
          code=$(curl -sS -G "https://api.odcloud.kr/api/ApplyhomeInfoDetailSvc/v1/getAPTLttotPblancDetail" \
            -H "Authorization: Infuser ${SERVICE_KEY}" \
            --data-urlencode "page=1" \
            --data-urlencode "perPage=50" \
            --data-urlencode "cond[HSSPLY_ADRES::LIKE]=기흥구" \
            -o resp_giheung.json -w "%{http_code}")
          echo "HTTP status: $code"
          python3 -c "import json; d=json.load(open('resp_giheung.json')); print('matchCount', d.get('matchCount'), 'totalCount', d.get('totalCount')); [print(x.get('HOUSE_NM'), '|', x.get('HOUSE_DTL_SECD_NM'), '|', x.get('HSSPLY_ADRES'), '|', x.get('RCRIT_PBLANC_DE')) for x in d.get('data', [])]"
