name: 거시지표 자동 수집 (금리·GDP·환율)

on:
  schedule:
    - cron: "10 22 * * *"  # 07:10 KST, 매일 1회 — 금리/GDP는 하루 여러 번 바뀔 이유가 없음
  workflow_dispatch: {}    # 수동 실행(테스트용)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 프리셋 전체 동기화
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python3 scripts/macro_data.py sync

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "macro-data-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add sources/macro-series.csv
          git diff --cached --quiet || git commit -m "거시지표 자동 동기화: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
