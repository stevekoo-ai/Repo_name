name: Subscription monitor (Seoul/Gyeonggi 국민주택)

on:
  schedule:
    - cron: "3 1 * * *"   # 10:03 KST
    - cron: "3 5 * * *"   # 14:03 KST
    - cron: "3 9 * * *"   # 18:03 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch listings and render page
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: python3 collectors/subscription_monitor/fetch_and_render.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/subscription-monitor.html
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: subscription monitor update $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M KST')"
            git push origin HEAD:main
          fi
