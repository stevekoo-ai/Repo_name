name: Daily PEOS Report

on:
  schedule:
    # 06:00 KST 시작 (23:00 UTC 전날) — 데이터 수집 개시
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      send_email:
        description: "이메일 발송 여부"
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: daily-peos-report
  cancel-in-progress: false

jobs:
  run-daily-peos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PEOS daily pipeline (06:00 KST 수집 개시)
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        # Writes report/<YYYY-MM-DD>.json, report/daily.html, a rendered
        # copy at docs/peos-report.html (served by GitHub Pages), and
        # appends today's row to data/peos_daily_history.csv — see
        # engine/report/run.py.
        run: python -m engine.report.run --daily

      - name: Send email notification (08:00 KST 완료)
        if: github.event.inputs.send_email != 'false'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import json
          from datetime import date
          from pathlib import Path
          from src.clock.notify import build_channel

          report_dir = Path('report')
          today_json = report_dir / f'{date.today().isoformat()}.json'

          if today_json.exists():
            with open(today_json) as f:
              payload = json.load(f)

            channel = build_channel()
            channel.send(
              subject='[PEOS Daily] Investment & Macro Update',
              body_text=f'Report Date: {date.today().isoformat()}\n\n'
                        f'Key Indicators:\n'
                        f'KR Regime: {payload.get(\"macro\", {}).get(\"regime\", \"N/A\")}\n'
                        f'US Regime: {payload.get(\"macro_us\", {}).get(\"regime\", \"N/A\")}\n'
                        f'Semiconductor Score: {payload.get(\"personal\", {}).get(\"semiconductor_score\", \"N/A\")}\n\n'
                        f'Full Report: https://stevekoo-ai.github.io/Repo_name/peos-report.html'
            )
          "

      - name: Commit updated report and history
        run: |
          git config user.name "peos-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add report/ data/peos_daily_history.csv docs/peos-report.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily PEOS report $(date -u +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
