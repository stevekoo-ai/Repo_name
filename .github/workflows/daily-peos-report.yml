name: Daily PEOS Report

on:
  schedule:
    # 21:00 UTC = 06:00 KST (next day)
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      month:
        description: "리포트 대상 월 (YYYY-MM). 비워두면 실행 시점의 이번 달."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-peos-report
  cancel-in-progress: false

jobs:
  run-peos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PEOS pipeline
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python -m engine.report.run --month "${{ github.event.inputs.month }}"
          else
            python -m engine.report.run
          fi

      - name: Regenerate PEOS Daily Dashboard
        run: python -m engine.report.daily_dashboard

      - name: Commit updated report, history, and dashboard
        run: |
          git config user.name "peos-bot"
          git config user.email "actions@users.noreply.github.com"
          git add report/ data/snapshots/ data/peos_daily_history.csv docs/peos-daily.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily PEOS report $(date -u +%Y-%m-%d)"
            git push
          fi
