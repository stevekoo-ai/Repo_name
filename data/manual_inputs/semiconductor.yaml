# EXAMPLE manual input for 반도체 특화 데이터 (Master Instruction 7.3, 12.2).
# DRAM/NAND/HBM price trends and CSP capex/AI server data have no single
# official real-time API; per the 7.3 exception policy this file is
# updated manually from 기업 IR(Micron/SK hynix/Samsung DS/TSMC/NVIDIA/
# Broadcom), 산업 리서치(TrendForce 등), 보도자료. Reliability grade is
# capped at 3 (★★★) to reflect this — see config/thresholds.yaml
# `semiconductor_exception_minimum_grade`.
#
# All *_signal values are analyst-normalized momentum scores in [-1, 1]
# (-1 = 강한 하락/역풍, 0 = 중립, +1 = 강한 상승/순풍), sourced from the
# cited references at `as_of`. Replace EXAMPLE values monthly.

as_of: "2026-06-30"
reliability_grade: 3
signals:
  dram_price_trend: 0.55        # EXAMPLE — TrendForce DRAM 계약가 추세
  nand_price_trend: 0.20        # EXAMPLE — TrendForce NAND 계약가 추세
  guidance_signal: 0.50         # EXAMPLE — Micron/SK hynix 가이던스 톤
  inventory_supply_signal: 0.15 # EXAMPLE — 재고/수급 코멘터리
  ai_leader_earnings: 0.70      # EXAMPLE — NVIDIA/Broadcom 실적·가이던스
  gpu_shipment: 0.60            # EXAMPLE — GPU 출하량 추세
  ai_server_shipment: 0.65      # EXAMPLE — AI 서버 출하량 추세
  csp_capex: 0.70               # EXAMPLE — CSP(하이퍼스케일러) 설비투자 추세
  hbm_signal: 0.80              # EXAMPLE — HBM 수요/공급 시그널
sources:
  - "Micron FY 실적발표/가이던스 (IR)"
  - "SK hynix 실적발표/컨퍼런스콜 (IR)"
  - "Samsung DS 실적발표 (IR)"
  - "TSMC 월간 매출 공시"
  - "NVIDIA / Broadcom 실적발표 (IR)"
  - "TrendForce 반도체 가격 리포트 (보조 데이터)"
